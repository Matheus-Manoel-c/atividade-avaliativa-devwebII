<h2 class="mb-4">Produtos</h2>

<p class="text-muted">Total de produtos: {{ produtos.length }}</p>
<table class="table table-striped table-hover shadow">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Nome</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let p of produtos">
      <td>
        <a [routerLink]="['/detalhe', p.id]" class="text-decoration-none">
          {{ p.id }}
        </a>
      </td>
      <td>
        <a [routerLink]="['/detalhe', p.id]" class="fw-bold text-decoration-none">
          {{ p.nome }}
        </a>
      </td>
    </tr>
  </tbody>
</table>
