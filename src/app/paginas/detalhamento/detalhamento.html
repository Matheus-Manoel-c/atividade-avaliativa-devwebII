<div *ngIf="produto; else erro">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="card shadow border-0">

        <div class="card-body">

          <h2 class="text-primary fw-bold">
            {{ produto.nome }}
          </h2>

          <hr>

          <p>
            <strong>ID:</strong>
            {{ produto.id }}
          </p>

          <p class="mt-3">
            {{ produto.descricao }}
          </p>

          <a
            routerLink="/produtos"
            class="btn btn-secondary mt-3">

            Voltar

          </a>

        </div>

      </div>

    </div>

  </div>

</div>

<ng-template #erro>

  <div class="alert alert-danger text-center">

    Produto não encontrado

  </div>

</ng-template>
